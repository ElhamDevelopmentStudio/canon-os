name: canonos-dev

x-api-environment: &api-environment
  DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.local}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-canonos-local-development-only}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,api,frontend}
  DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
  DJANGO_CORS_ALLOW_CREDENTIALS: ${DJANGO_CORS_ALLOW_CREDENTIALS:-true}
  DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
  DATABASE_URL: postgresql://${POSTGRES_USER:-canonos}:${POSTGRES_PASSWORD:-canonos}@postgres:5432/${POSTGRES_DB:-canonos}
  REDIS_URL: redis://redis:6379/${REDIS_DB:-0}
  CELERY_BROKER_URL: redis://redis:6379/${REDIS_DB:-0}
  CELERY_RESULT_BACKEND: redis://redis:6379/${CELERY_RESULT_DB:-1}
  CELERY_TASK_ALWAYS_EAGER: "false"
  DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}

x-api-build: &api-build
  context: ..
  dockerfile: infra/docker/api.Dockerfile

services:
  postgres:
    image: postgres:15-alpine
    container_name: canonos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-canonos}
      POSTGRES_USER: ${POSTGRES_USER:-canonos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-canonos}
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - canonos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: canonos-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - canonos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    profiles: ["app"]
    build: *api-build
    image: canonos-api:local
    container_name: canonos-api
    restart: unless-stopped
    environment:
      <<: *api-environment
    command: >-
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python -m gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120 --access-logfile -"
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    profiles: ["app"]
    build: *api-build
    image: canonos-api:local
    pull_policy: never
    container_name: canonos-worker
    restart: unless-stopped
    environment:
      <<: *api-environment
    command:
      [
        "python",
        "-m",
        "celery",
        "-A",
        "config",
        "worker",
        "--loglevel=info",
        "--queues=default,health,metadata,imports,scoring,ai,maintenance",
      ]
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    profiles: ["app"]
    build: *api-build
    image: canonos-api:local
    pull_policy: never
    container_name: canonos-beat
    restart: unless-stopped
    environment:
      <<: *api-environment
    command: ["python", "-m", "celery", "-A", "config", "beat", "--loglevel=info", "--schedule", "/tmp/celerybeat-schedule"]
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_DOCKER_API_BASE_URL:-/api}
    image: canonos-web:local
    container_name: canonos-web
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  canonos_postgres_data:
  canonos_redis_data:
