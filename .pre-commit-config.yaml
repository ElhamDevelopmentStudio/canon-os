repos:
  - repo: local
    hooks:
      - id: backend-format-check
        name: Backend formatting check
        entry: corepack pnpm --filter @canonos/api run format:check
        language: system
        pass_filenames: false
        files: ^apps/api/
      - id: frontend-format-check
        name: Frontend formatting check
        entry: corepack pnpm --filter @canonos/web run format:check
        language: system
        pass_filenames: false
        files: ^apps/web/
      - id: backend-lint
        name: Backend lint
        entry: corepack pnpm --filter @canonos/api run lint
        language: system
        pass_filenames: false
        files: ^apps/api/
      - id: frontend-lint
        name: Frontend lint
        entry: corepack pnpm --filter @canonos/web run lint
        language: system
        pass_filenames: false
        files: ^apps/web/
